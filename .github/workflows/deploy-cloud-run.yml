name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-excel-ai-chat
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: digitalds-6ef38
  GCP_REGION: asia-northeast3
  GCP_SERVICE: excel-ai-chat
  GCP_REPO: excel-ai-chat
  IMAGE: asia-northeast3-docker.pkg.dev/digitalds-6ef38/excel-ai-chat/excel-ai-chat:latest
  RUNTIME_ENV_VARS: >-
    GEMINI_MODEL=gemini-3.5-flash,
    GEMINI_EMBEDDING_MODEL=gemini-embedding-001,
    RAG_TOP_K=24,
    RAG_EMBED_BATCH_SIZE=100,
    RAG_EMBED_CONCURRENCY=8,
    RAG_ROWS_PER_CHUNK=25,
    RAG_EMBEDDING_DIMENSIONS=768,
    RAG_INDEX_QA=true,
    RAG_MAX_QA_INDEX_ROWS=5000,
    GEMINI_MAX_DIGEST_BODY_CHARS=3000,
    GEMINI_MAX_LOCATION_DIGEST_CHARS=80000,
    LECTURE_HOTSPOT_SEGMENT_MINUTES=10,
    LECTURE_TIME_TOLERANCE_MINUTES=5,
    COMMUNITY_MAP_CHARS_PER_ROW=280,
    UPLOAD_MAX_BYTES=31457280,
    CHAT_MAX_REQUEST_BYTES=25000000,
    BLOB_TTL_HOURS=24,
    GCS_UPLOAD_BUCKET=seesign-chat-uploads-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "$GCP_PROJECT_ID"

      - name: Build and push image (gcloud builds submit)
        run: |
          gcloud builds submit --config cloudbuild.yaml \
            --substitutions="_REGION=${GCP_REGION},_REPO=${GCP_REPO},_SERVICE=${GCP_SERVICE},_TAG=latest,_NEXT_PUBLIC_BASE_PATH=/chat,_NEXT_PUBLIC_AIBLE_BOX_URL=https://aible-box.vercel.app,_NEXT_PUBLIC_SEESIGN_ADMIN_URL=https://seesign-admin.digitalds.store/main,_NEXT_PUBLIC_CHAT_GUIDE_URL=https://seesign.mintlify.app/guide/chat/ready"

      - name: Deploy to Cloud Run (gcloud run deploy)
        run: |
          gcloud run deploy "$GCP_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --timeout 900 \
            --concurrency 20 \
            --set-env-vars "$RUNTIME_ENV_VARS" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest,CRON_SECRET=CRON_SECRET:latest"