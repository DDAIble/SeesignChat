# Cloud Build: Docker 이미지 빌드 → Artifact Registry 푸시
# git push 시 GitHub Actions가 gcloud builds submit 으로 실행합니다.
#
# 로컬 수동 실행:
#   gcloud builds submit --config cloudbuild.yaml

substitutions:
  _REGION: asia-northeast3
  _REPO: excel-ai-chat
  _SERVICE: excel-ai-chat
  _TAG: latest
  _NEXT_PUBLIC_BASE_PATH: "/chat"
  _NEXT_PUBLIC_AIBLE_BOX_URL: "https://aible-box.vercel.app"
  _NEXT_PUBLIC_SEESIGN_ADMIN_URL: "https://seesign-admin.digitalds.store/main"
  _NEXT_PUBLIC_CHAT_GUIDE_URL: "https://seesign.mintlify.app/guide/chat/ready"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}"

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}"
      - "--build-arg"
      - "NEXT_PUBLIC_BASE_PATH=${_NEXT_PUBLIC_BASE_PATH}"
      - "--build-arg"
      - "NEXT_PUBLIC_AIBLE_BOX_URL=${_NEXT_PUBLIC_AIBLE_BOX_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_SEESIGN_ADMIN_URL=${_NEXT_PUBLIC_SEESIGN_ADMIN_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_CHAT_GUIDE_URL=${_NEXT_PUBLIC_CHAT_GUIDE_URL}"
      - "."

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8